                <div id="intern-program-container">
                    <h2>Intern Program<span style="color: #D72525">*</span></h2>
                    
                    <div id="intern-program">
                        <form>
                            <h3 id="description-text"><label for="description">Description under "Join Us"</label></h3>
                            <textarea name="description" id="description" placeholder="Insert text..." required></textarea>

                            <h3><label for="url">Sign Up Link</label></h3>
                            <input type="text" name="url" id="url" placeholder="Enter URL..." required>

                            <h3><label for="picture">Upload Image</label></h3>
                            <input type="button" name="picture" id="picture" placeholder="Upload Image" required>


                        </form>
                        
                    </div>

                    <h2>How does it work<span style="color: #D72525">*</span></h2>
